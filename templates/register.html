<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册</title>
  <!-- 引入外部CSS样式文件 -->
  <link rel="stylesheet" href="../static/css/register.css">
</head>

<body>
  <div class="register-box">
    <h2>注册Friendship账号</h2>
    
    <!-- 错误信息显示 -->
    {% if error %}
    <div class="error-message">
      {{ error }}
    </div>
    {% endif %}
    
    <form method="post" action="/do_register">
      <div class="input-group">
        <label>用户名</label>
        <input type="text" name="username" placeholder="请输入用户名" required>
      </div>
      <div class="input-group">
        <label>手机号</label>
        <input type="tel" name="phone" placeholder="请输入手机号" required>
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" name="password" placeholder="请输入密码（不少于6位）" required minlength="6">
      </div>
      <div class="input-group">
        <label>确认密码</label>
        <input type="password" name="confirm_password" placeholder="请再次输入密码" required>
      </div>
      <button type="submit" class="btn-register">注册</button>
    </form>
    
    <div class="link-group">
      <a href="/login">已有账号？去登录</a>
    </div>
  </div>
</body>

</html>
