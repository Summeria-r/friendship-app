<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>与 {{ user.nickname }} 聊天</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/common.css">
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>

<body>
  {% include 'common.html' %}

  <div style="
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    background: #f5f7fa;
    padding: 20px;
  ">

  <div style="
    width: 420px;
    background: #fff;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  ">
    <div style="display: flex; align-items: center; gap: 22px;">
      <img src="{{ user.avatar or 'https://a0ai.marscode.cn/api/ide/v1/text_to_image?prompt=user%20avatar%20portrait%20friendly%20college%20student%20professional&image_size=square' }}" 
           style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover;">
      
      <div>
        <div style="font-size: 24px; font-weight: 600; color: #222;">
          {{ user.nickname }}
        </div>
        <span style="
          display: inline-block;
          margin-top: 8px;
          padding: 6px 14px;
          font-size: 14px;
          background: #e6f7ef;
          color: #00b479;
          border-radius: 12px;
          font-weight: 500;
        ">{{ user.major or '同学' }}</span>
      </div>
    </div>

    <button onclick="location.href='/messages/chat/{{ user.id }}'" style="
      width: 100%;
      margin-top: 30px;
      padding: 18px 0;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
    ">
      去私聊
    </button>
  </div>

  </div>
</body>

</html>
