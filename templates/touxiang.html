<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>头像上传</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Microsoft Yahei', sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .title {
      font-size: 22px;
      color: #333;
      margin-bottom: 30px;
    }

    .avatar-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 25px;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e4eaf3;
      background: #f7f8fa;
    }

    #fileInput {
      display: none;
    }

    .upload-btn {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 36px;
      height: 36px;
      background: #409eff;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 2px 8px rgba(64,158,255,0.3);
      transition: 0.2s;
    }

    .upload-btn:hover {
      background: #338eef;
    }

    .btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-clear {
      background: #f5f7fa;
      color: #666;
    }

    .btn-clear:hover {
      background: #e5eaf3;
    }

    .btn-save {
      background: #409eff;
      color: white;
    }

    .btn-save:hover {
      background: #338eef;
    }

    .tip {
      font-size: 13px;
      color: #999;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">设置头像</div>

    <form method="post" action="/upload_avatar" enctype="multipart/form-data">
      <div class="avatar-wrap">
        <img id="preview" class="avatar" src="{{ avatar if avatar else '/static/images/默认头像.jpg' }}" alt="预览头像">
        <label for="fileInput" class="upload-btn">+</label>
        <input type="file" id="fileInput" name="file" accept="image/png, image/jpeg, image/jpg">
      </div>

      <div class="btns">
        <button type="submit" class="btn-save" id="saveBtn">保存头像</button>
      </div>
    </form>

    <div class="tip">支持 JPG / PNG，建议尺寸正方形</div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const saveBtn = document.getElementById('saveBtn');
 
    // 上传预览
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        preview.src = reader.result;
      }
      reader.readAsDataURL(file);
    });
 
    // 保存
    saveBtn.addEventListener('click', function() {
      if (!fileInput.files.length) {
        alert('请先选择一张图片');
        return;
      }
      alert('头像上传成功！');
    });
  </script>
</body>
</html>
